<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hospital HR | Create Account</title>
  <link rel="shortcut icon" type="image/png" href="../assets/images/logos/seodashlogo.png" />
  <style>
    :root {
      --primary: #5d87ff;
      --secondary: #4570e6;
      --bg: #f4f6fb;
    }

    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f4f6fb 0%, #eef2ff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* GLASSMORPHISM CARD */
    .register-container {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
      border-radius: 24px;
      width: 100%;
      max-width: 500px;
      padding: 40px;
      margin: 20px;
      text-align: center;
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-logo {
      margin-bottom: 20px;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .form-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #5a6a85;
      margin-bottom: 6px;
    }

    .form-input {
      width: 100%;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid #dfe5ef;
      background: white;
      font-size: 0.9rem;
      transition: all 0.3s ease;
      box-sizing: border-box;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(93, 135, 255, 0.1);
    }

    .btn-register {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 15px;
    }

    .btn-register:hover {
      background: var(--secondary);
    }

    .footer-links {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #7c8fac;
    }

    .footer-links a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="register-container">
    <div class="brand-logo">
      <span>🏥</span> Hospital HR
    </div>
    <h2 style="margin-bottom: 8px; color: #2a3547;">Create Account</h2>
    <p style="color: #7c8fac; font-size: 0.85rem; margin-bottom: 25px;">Join the Hospital Management System</p>

    <form id="registerForm">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
      </div>

      <div class="form-group">
        <label>Employee ID</label>
        <input type="text" id="employeeId" class="form-input" placeholder="e.g. EMP-2024-XXX" required>
      </div>

      <div class="form-group">
        <label>Department Role</label>
        <select class="form-input" id="roleSelect" required style="appearance: none; background-image: url('data:image/svg+xml;charset=UTF-8,%3csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%235a6a85\' stroke-width=\'2\' stroke-linecap=\'round\' stroke-linejoin=\'round\'%3e%3cpolyline points=\'6 9 12 15 18 9\'%3e%3c/polyline%3e%3c/svg%3e'); background-repeat: no-repeat; background-position: right 1rem center; background-size: 1em;">
          <option value="" disabled selected>Select your HR unit</option>
          <option value="HR1">HR1 - Recruitment</option>
          <option value="HR2">HR2 - Learning</option>
          <option value="HR3">HR3 - Workforce</option>
          <option value="HR4">HR4 - Intelligence</option>
        </select>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-register">Sign Up</button>
    </form>

    <div class="footer-links">
      Already have an account? <a href="login.html">Sign In</a>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const role = document.getElementById('roleSelect').value;
      const id = document.getElementById('employeeId').value;
      const name = document.getElementById('fullName').value;

      // Logic matches our new single-dashboard system
      sessionStorage.setItem('userRole', role);
      sessionStorage.setItem('employeeId', id);
      sessionStorage.setItem('employeeName', name);
      sessionStorage.setItem('isLoggedIn', 'true');

      alert('Registration Successful! Welcome to the team.');
      
      // Always redirect to the main dashboard
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
